name: Publish

# Trigger on version tags (e.g. v0.2.0) or manually.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── npm (guest-js TypeScript bindings) ───────────────────────────────────────
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: guest-js
        run: npm install

      - name: Build
        working-directory: guest-js
        run: npm run build

      - name: Copy README
        run: cp README.md guest-js/README.md

      - name: Check if version changed
        id: version-check
        working-directory: guest-js
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view tauri-plugin-litert-api version 2>/dev/null || echo "0.0.0")
          if [ "$PACKAGE_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "Version changed: $PUBLISHED_VERSION → $PACKAGE_VERSION"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged ($PACKAGE_VERSION) — skipping publish"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: guest-js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── crates.io (Rust crate) ────────────────────────────────────────────────────
  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libssl-dev patchelf

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: crates-cargo-${{ hashFiles('Cargo.toml') }}
          restore-keys: crates-cargo-

      - name: Check if version changed
        id: version-check
        run: |
          PACKAGE_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(p['version'] for p in d['packages'] if p['name']=='tauri-plugin-litert'))")
          PUBLISHED_VERSION=$(cargo search tauri-plugin-litert --limit 1 2>/dev/null \
            | grep '^tauri-plugin-litert ' | grep -oP '"\K[^"]+' | head -1 || echo "0.0.0")
          echo "Local: $PACKAGE_VERSION  Published: $PUBLISHED_VERSION"
          if [ "$PACKAGE_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged — skipping crate publish"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to crates.io
        if: steps.version-check.outputs.should_publish == 'true'
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
